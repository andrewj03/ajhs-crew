  var rs=g('rs');rs.innerHTML='';
  var secs=[{"id": "setup", "title": "Before You Knock", "color": "#64748b", "html": "<div class=\"sh4\" style=\"color:#64748b\">Physical Setup</div><div class=\"sbul\">+ AJ Home Services shirt on - visible branding</div><div class=\"sbul\">+ Clipboard or phone in hand</div><div class=\"sbul\">+ Stand 1-2 steps back from door</div><div class=\"sbul\">+ Feet shoulder width apart</div><div class=\"sbul\">+ Hands visible - never in pockets</div><div class=\"sbul\">+ Smile before the door opens</div><div class=\"sh4\" style=\"color:#64748b\">Know Before You Knock</div><div class=\"sbul\">+ 1-2 neighbor names from Jobber</div><div class=\"sbul\">+ What services those neighbors booked</div><div class=\"sbul\">+ Phone charged - book and log on the spot</div><div class=\"sbul\">+ Business cards for every unanswered door</div>"}, {"id": "open", "title": "Step 1 - The Opening", "color": "#22d3ee", "html": "<div class=\"sh4\" style=\"color:#22d3ee\">Standard Opening</div><div class=\"sq\">Hey, how is it going? I am [Name] with AJ Home Services. We are actually working on a few homes on your street this week - we just finished [neighbor] place down the block. We do everything on the exterior - house washing, gutters, windows, solar panels, pressure washing, roof cleaning. While we are already set up out here we have some availability and we are offering a group rate to neighbors. Is there anything on the exterior you have been meaning to get taken care of?</div><div class=\"sc\">Point down the street toward the neighbor house. Make eye contact when you ask the question.</div><div class=\"sh4\" style=\"color:#22d3ee\">Power Version - Just Finished Nearby</div><div class=\"sq\">Hey - I am [Name] with AJ Home Services. We literally just finished [neighbor] place right there. You can probably see the difference from here. While the crew is still set up on your street I wanted to see if there is anything we could take care of for you too. What is the biggest thing you have been wanting to get done out here?</div><div class=\"sn\">Power version converts 2-3x better. Always knock the 5 nearest houses immediately after finishing a job.</div>"}, {"id": "qual", "title": "Step 2 - Qualifying Question", "color": "#a78bfa", "html": "<div class=\"sq\">Let me ask you - when you look at the outside of your house, what bothers you most? Is it the exterior itself, the windows, the gutters, the driveway - or is there something specific you have been putting off?</div><div class=\"sc\">Casually glance around their property. If you spot something obvious, point to it.</div><div class=\"sn\">Once they answer, go straight to the matching service branch. Their answer is your roadmap.</div>"}, {"id": "branch", "title": "Step 3 - Service Branches", "color": "#f59e0b", "html": "<div class=\"sh4\" style=\"color:#f59e0b\">1. House Washing</div><div class=\"sq\">Perfect - that is actually what we have been doing all week on your street. We do a soft wash which is way more effective than a regular pressure washer on siding - it gets into the pores and kills the mold and mildew at the root so it stays clean way longer. For a home your size with the group rate we are looking at about $[price].</div><div class=\"sbun\">Bundle: While the crew is up on the house anyway - when did you last have the gutters cleared? I can bundle that in and you save yourself a separate call later.</div><div class=\"sh4\" style=\"color:#f59e0b\">2. Gutter Cleaning</div><div class=\"sq\">Yeah gutters are easy to forget until they start causing real problems - once they overflow it backs up under the roofline into the fascia boards. Expensive fix. We go up, clear everything out, flush the downspouts, and rinse the roofline. For a home your size with the group rate we are at about $[price]. Takes about an hour.</div><div class=\"sbun\">Bundle: Since the crew is already going to be up on ladders - is the exterior of the house something you would want handled at the same time?</div><div class=\"sh4\" style=\"color:#f59e0b\">3. Window Cleaning</div><div class=\"sq\">Windows make such a big difference. We do full exterior cleaning, tracks, and screens. For hard water stains we have a treatment that removes the mineral buildup that regular cleaning cannot touch. For a home your size we are at about $[price] with the group rate.</div><div class=\"sbun\">Bundle: If you have solar panels - dirty windows and dirty panels are basically the same problem. Do you have solar?</div><div class=\"sh4\" style=\"color:#f59e0b\">4. Solar Panel Cleaning</div><div class=\"sq\">Solar panels lose 15-25% of their efficiency when they get dirty. Most people do not realize how much it is affecting their energy bill. We use a deionized water system that will not scratch the panels or void your warranty. For a typical residential system it is about $[price].</div><div class=\"sbun\">Bundle: While we are up on the roof area - are the gutters something that needs attention too?</div><div class=\"sh4\" style=\"color:#f59e0b\">5. Pressure Washing</div><div class=\"sq\">Yeah the driveway and concrete are something people notice a lot. We do a hot water pressure wash that gets deep into the pores and lifts the staining and oil out. For a standard driveway with the group rate we are looking at $[price].</div><div class=\"sbun\">Bundle: And if the house exterior is something you have been thinking about too - soft washing the house and doing the driveway together is a really popular combo.</div><div class=\"sh4\" style=\"color:#f59e0b\">6. Roof Cleaning</div><div class=\"sq\">Those black streaks are actually a bacteria called gloeocapsa magma. Left alone it shortens the life of your roof by years. We do a low pressure soft wash treatment that kills it at the root. Results last 2-3 years. For a home your size we are looking at $[price].</div><div class=\"sbun\">Bundle: While we are up there - the gutters are worth checking too.</div>"}, {"id": "close", "title": "Step 4 - The Close", "color": "#22c55e", "html": "<div class=\"sq\">So did you want to go ahead and get that locked in? I can get you on the schedule for this week while we are already in the neighborhood. What works better - tomorrow or later in the week?</div><div class=\"sc\">Plant your feet. Hold eye contact. The silence after this question is part of the close - do not fill it. First person to speak loses.</div><div class=\"sh4\" style=\"color:#22c55e\">If they hesitate</div><div class=\"sq\">Totally fine - even if you just want to start with the [primary service] today and we come back for the rest, that works too. Want to at least lock in the [primary service] while the group rate is available?</div><div class=\"sn\">One service booked is infinitely better than zero. Never leave empty-handed if there is any interest at all.</div>"}, {"id": "obj", "title": "Step 5 - Smokescreen Objections", "color": "#f43f5e", "html": "<div style=\"font-size:10px;color:#555;margin-bottom:10px;line-height:1.5\">A smokescreen is a polite way of saying no without saying no. Ask one more question to find the real barrier.</div><div class=\"sn\">Universal buster: Hey - totally respect that. Can I ask honestly - is it a hard no or more of a not right now?</div><div class=\"sh4\" style=\"color:#f43f5e\">I need to think about it</div><div class=\"sq\">Totally get that. Can I ask - is it more about the timing, the price, or just not sure if you need it done right now? I want to make sure I answered everything before I leave.</div><div class=\"sfo\">If price: I hear you - the group rate is the best I can do while we are on your street. If it helps I can break it into two visits.</div><div class=\"sh4\" style=\"color:#f43f5e\">Send me some info</div><div class=\"sq\">Of course - what is the best number? I will text you right now so you have it. And honestly the best way to see our work is the before and after photos - let me pull one up real quick.</div><div class=\"sfo\">After photos: Pretty dramatic right? That is a house two streets over. Is that the kind of result you would want?</div><div class=\"sh4\" style=\"color:#f43f5e\">I have to ask my spouse</div><div class=\"sq\">Absolutely makes sense. Is he/she home right now? I can take two minutes to walk you both through it. Or a lot of couples just do a quick text - want to shoot them a message right now while I am here?</div><div class=\"sfo\">If not home: Let me text you the details right now. When do you think you would have a chance to chat about it? Get a specific day and follow up exactly then.</div><div class=\"sh4\" style=\"color:#f43f5e\">We already have someone</div><div class=\"sq\">Oh nice - who do you use? How have they been? Are you happy with them?</div><div class=\"sfo\">If they hesitate: A lot of our clients switched to us after having some inconsistency. We document everything with before and after photos.</div><div class=\"sh4\" style=\"color:#f43f5e\">Not right now / maybe later</div><div class=\"sq\">Totally understand - when do you think you would want to get it done? Summer? Fall? I ask because our schedule fills up fast in peak season.</div><div class=\"sfo\">If timeframe: Perfect - what if I reach out in that month? I will put you on our early booking list. What is the best number?</div>"}, {"id": "after", "title": "Step 6 - After Every Door", "color": "#818cf8", "html": "<div class=\"sh4\" style=\"color:#818cf8\">If they book</div><div class=\"sbul\">+ Get name, number, best day and time</div><div class=\"sbul\">+ Log in Jobber immediately</div><div class=\"sbul\">+ Confirm text within 5 minutes</div><div class=\"sbul\">+ Knock the 4-5 nearest neighbors right now</div><div class=\"sbul\">+ Tell manager so crew is scheduled</div><div class=\"sh4\" style=\"color:#818cf8\">If they dont book</div><div class=\"sbul\">+ Leave a business card every time</div><div class=\"sbul\">+ If they gave a number - follow up in 2 days</div><div class=\"sbul\">+ If they gave a timeframe - set a Jobber reminder</div><div class=\"sbul\">+ Walk away cleanly - never linger</div>"}];

  ZONES.forEach(function(z){var s=czS(z);var pct=s.t>0?Math.round(s.d/s.t*100):0;h+='<div class="zc"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:12px;font-weight:700;color:'+z.color+'">'+z.name+'</div><div style="font-size:7px;color:#333">Wk '+z.wk+' - '+z.avg+' - Tier '+z.tier+'</div></div><div style="font-size:20px;font-weight:700;color:'+(pct===100?'#22c55e':'#fff')+';line-height:1">'+pct+'<span style="font-size:9px;color:#444">%</span></div></div><div style="display:flex;gap:12px;margin-top:8px">'+[['knocked',s.d,'#22c55e'],['skip',s.sk,'#ef4444'],['left',s.r,'#444']].map(function(x){return '<div><div style="font-size:13px;font-weight:700;color:'+x[2]+'">'+x[1]+'</div><div style="font-size:7px;color:#252525">'+x[0].toUpperCase()+'</div></div>';}).join('')+'</div><div style="margin-top:6px;height:3px;background:#1a1a1a;border-radius:2px"><div style="height:3px;border-radius:2px;background:'+z.color+';width:'+pct+'%"></div></div></div>';});
  h+='</div><div class="mc"><div style="font-size:9px;color:#444;letter-spacing:.12em;margin-bottom:8px">ACTIVITY LOG</div>';
  if(!ST.log.length){h+='<div style="font-size:10px;color:#252525">No activity yet.</div>';}else{h+='<div class="lw">';ST.log.forEach(function(e){var zc=(ZONES.find(function(z){return z.id===e.zone;})||{}).color||'#444';h+='<div class="lr"><div style="color:#222;min-width:65px">'+e.date+' '+e.time+'</div><div style="font-weight:700;color:#666;min-width:50px">'+e.rep+'</div><div style="font-weight:700;color:'+(e.action==='done'?'#22c55e':e.action==='skip'?'#ef4444':'#444')+';min-width:38px">'+e.action+'</div><div style="color:#333;flex:1">'+e.street+'</div><div style="color:'+zc+'">'+e.zone+'</div></div>';});h+='</div>';}
  h+='</div>';
  g('mgr').innerHTML=h;
}
g('pw').focus();
</script>

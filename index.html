<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>AJ Home Services — D2D Crew Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#080808;color:#e0e0e0;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column}
button{font-family:'Courier New',monospace;cursor:pointer}
input{font-family:'Courier New',monospace}
::-webkit-scrollbar{width:0;height:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#111;border:1px solid #333;border-radius:12px;padding:28px 24px;width:290px;text-align:center}
.modal h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.modal p{font-size:11px;color:#555;margin-bottom:18px;line-height:1.6}
.modal input{width:100%;background:#0e0e0e;border:1px solid #2a2a2a;border-radius:6px;color:#e0e0e0;padding:10px 12px;font-size:15px;font-family:'Courier New',monospace;outline:none;margin-bottom:10px;text-align:center;letter-spacing:.15em}
.modal input.err{border-color:#ef4444}
.err-msg{font-size:11px;color:#ef4444;margin-bottom:8px;margin-top:-4px}
.btn-primary{width:100%;background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.4);border-radius:6px;color:#22d3ee;padding:10px;font-size:13px;font-family:'Courier New',monospace;font-weight:700}
.btn-row{display:flex;gap:8px}
.btn-row button{flex:1;padding:9px;border-radius:6px;font-size:12px;font-family:'Courier New',monospace;font-weight:700}
.btn-cancel{background:transparent;border:1px solid #333;color:#555}
/* header */
#header{background:#0e0e0e;padding:10px 14px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0}
#header .logo{font-size:15px;font-weight:700;color:#22d3ee}
#header .sub{font-size:7px;color:#333;letter-spacing:.15em;text-transform:uppercase}
#header .stats{font-size:8px;color:#2a2a2a}
#header .stats span{color:#22c55e}
.nav-tabs{display:flex;border:1px solid #1a1a1a;border-radius:6px;overflow:hidden}
.nav-tabs button{padding:5px 10px;background:transparent;border:none;border-right:1px solid #1a1a1a;color:#333;font-size:11px;font-family:'Courier New',monospace}
.nav-tabs button:last-child{border-right:none}
.nav-tabs button.active{background:rgba(34,211,238,.1);color:#22d3ee;font-weight:700}
.sync-bar{display:flex;gap:8px;align-items:center}
.sync-bar span{font-size:8px;color:#333}
.sync-bar span.ok{color:#22c55e}
.sync-bar span.syncing{color:#f59e0b}
.icon-btn{font-size:8px;color:#444;background:transparent;border:1px solid #1e1e1e;border-radius:4px;padding:2px 6px}
/* zone tabs */
#zone-tabs{display:flex;overflow-x:auto;background:#0a0a0a;border-bottom:1px solid #141414;scrollbar-width:none;flex-shrink:0}
#zone-tabs::-webkit-scrollbar{display:none}
#zone-tabs button{padding:8px 12px;background:transparent;border:none;border-bottom:2px solid transparent;color:#2e2e2e;font-size:9px;font-family:'Courier New',monospace;white-space:nowrap}
#zone-tabs button.active{border-bottom-color:var(--zc);color:var(--zc);font-weight:700}
/* zone meta */
#zone-meta{padding:6px 14px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;flex-shrink:0;border-bottom:1px solid #111}
#zone-meta .meta-item{display:flex;gap:4px;align-items:center}
#zone-meta .meta-label{font-size:7px;color:#333}
#zone-meta .meta-val{font-size:10px;font-weight:700}
#zone-meta .note{font-size:8px;color:#252525;flex:1;min-width:100px}
/* field layout */
#field-layout{display:flex;flex:1;overflow:hidden}
#nb-sidebar{width:155px;min-width:155px;background:#090909;border-right:1px solid #111;overflow-y:auto;padding-top:4px}
.nb-item{padding:8px 9px;cursor:pointer;border-left:2px solid transparent}
.nb-item.active{border-left-color:var(--zc);background:rgba(0,0,0,.3)}
.nb-item .nb-name{font-size:8px;line-height:1.3;color:#333}
.nb-item.active .nb-name{color:#ddd;font-weight:700}
.nb-item .nb-days{font-size:7px;color:#252525;margin-top:1px}
.nb-item .nb-stat{font-size:7px;color:#282828;margin-top:1px}
.nb-progress{margin-top:3px;height:2px;background:#151515;border-radius:1px}
.nb-progress-fill{height:2px;border-radius:1px;background:rgba(255,255,255,.2)}
.recent-label{margin:8px 8px 3px;font-size:7px;color:#1e1e1e;letter-spacing:.1em}
.log-item{padding:3px 9px;border-bottom:1px solid #0c0c0c}
.log-item .li-rep{font-size:7px;color:#282828}
.log-item .li-street{font-size:6px;color:#1c1c1c;margin-top:1px}
/* street list */
#street-pane{flex:1;overflow-y:auto;padding:12px}
.street-header{margin-bottom:10px}
.street-header h3{font-size:12px;font-weight:700;color:#f0f0f0}
.street-header .sh-meta{font-size:8px;color:#333;margin-top:2px}
.street-hint{margin-top:5px;font-size:7px;color:#252525;background:#0c0c0c;border:1px solid #151515;border-radius:4px;padding:3px 7px;display:inline-block}
.streets-list{display:flex;flex-direction:column;gap:3px;margin-top:8px}
.street-row{border-radius:5px;border:1px solid #161616;background:#0d0d0d}
.street-row.done{background:#0c190c;border-color:rgba(34,197,94,.1)}
.street-row.skip{background:#190c0c;border-color:rgba(239,68,68,.1)}
.street-row .sr-inner{display:flex;align-items:center;padding:6px 8px;gap:6px;cursor:pointer}
.street-num{width:18px;height:18px;border-radius:3px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;flex-shrink:0}
.street-name{flex:1;font-size:11px;font-weight:600;color:#bbb}
.street-row.done .street-name{color:#255025}
.street-row.skip .street-name{color:#502525;text-decoration:line-through}
.added-badge{margin-left:5px;font-size:7px;color:#1a5a1a;background:#0a1a0a;border:1px solid #143a14;padding:1px 4px;border-radius:2px}
.sr-btns{display:flex;gap:3px}
.sr-btn{width:28px;height:28px;border-radius:4px;border:1px solid #1c1c1c;background:transparent;font-size:13px;display:flex;align-items:center;justify-content:center}
.sr-btn.done-btn.active{border-color:#22c55e;background:rgba(34,197,94,.13);color:#22c55e}
.sr-btn.skip-btn.active{border-color:#ef4444;background:rgba(239,68,68,.13);color:#ef4444}
.sr-btn.del-btn{color:#252525;font-size:9px}
.sr-detail{padding:4px 8px 8px 32px;border-top:1px solid #111;font-size:8px;color:#2a2a2a;line-height:1.9}
.add-street{display:flex;gap:7px;margin-top:12px}
.add-street input{flex:1;background:#0d0d0d;border:1px solid #1c1c1c;border-radius:5px;color:#777;padding:7px 8px;font-size:10px;font-family:'Courier New',monospace;outline:none}
.add-street button{padding:7px 11px;border-radius:5px;font-size:10px;font-family:'Courier New',monospace;font-weight:700}
/* bottom bar */
#bottom-bar{background:#090909;border-top:1px solid #111;padding:6px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#bottom-bar .bb-bar{flex:1;height:3px;background:#141414;border-radius:2px}
#bottom-bar .bb-fill{height:3px;border-radius:2px;transition:width .3s}
#bottom-bar .bb-stat{font-size:8px;color:#3a3a3a;font-weight:700;white-space:nowrap}
/* resources */
#resources{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.res-tabs{display:flex;background:#0a0a0a;border-bottom:1px solid #141414;flex-shrink:0}
.res-tabs button{flex:1;padding:10px;background:transparent;border:none;border-bottom:2px solid transparent;color:#333;font-size:10px;font-family:'Courier New',monospace}
.res-tabs button.active{border-bottom-color:#22d3ee;color:#22d3ee;font-weight:700}
.res-content{flex:1;overflow-y:auto;padding:12px 14px}
.golden-rule{background:#1a1000;border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:10px 14px;margin-bottom:14px}
.golden-rule .gr-title{font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:4px}
.golden-rule .gr-body{font-size:11px;color:#c47d0a;line-height:1.5}
.collapsible{margin-bottom:8px}
.coll-header{width:100%;background:#0f0f0f;border:1px solid #1a1a1a;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;text-align:left}
.coll-header.open{border-radius:8px 8px 0 0;border-bottom-color:transparent}
.coll-header .ch-title{font-size:11px;font-weight:700;color:#bbb}
.coll-header .ch-arrow{font-size:12px;color:#444}
.coll-body{background:#0c0c0c;border:1px solid #161616;border-top:none;border-radius:0 0 8px 8px;padding:10px 14px}
/* pricing table */
.price-table{width:100%;border-collapse:collapse;margin:8px 0}
.price-table .th{font-size:8px;color:#444;letter-spacing:.1em;padding:3px 0;border-bottom:1px solid #1a1a1a}
.price-table td{padding:5px 0;border-bottom:1px solid #111;font-size:10px;vertical-align:top}
.price-table .td-size{color:#aaa;width:35%}
.price-table .td-price{font-weight:700;width:30%}
.price-table .td-note{color:#555;font-size:9px}
.price-extra{margin-top:8px;font-size:10px;color:#555;background:#111;border-radius:5px;padding:7px 10px;line-height:1.6;border-left:2px solid rgba(255,255,255,.1)}
/* script */
.script-block{margin-bottom:6px}
.script-quote{font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(255,255,255,.15)}
.script-cue{margin-top:5px;font-size:10px;color:#555;background:#0e0e0e;border-radius:5px;padding:5px 8px;border-left:2px solid #333;line-height:1.5}
.script-note{margin-top:5px;font-size:10px;color:#f59e0b;background:#1a1000;border-radius:5px;padding:5px 8px;line-height:1.5}
.script-bundle{margin-top:5px;font-size:10px;color:#22c55e;background:#0a1a0a;border-radius:5px;padding:5px 8px;border-left:2px solid rgba(34,197,94,.25);line-height:1.5}
.script-follow{margin-top:5px;font-size:10px;color:#818cf8;background:#0a0a1a;border-radius:5px;padding:5px 8px;line-height:1.5}
.script-heading{font-size:10px;font-weight:700;margin-bottom:5px;letter-spacing:.05em}
.bullet-list{display:flex;flex-direction:column;gap:2px}
.bullet-list div{font-size:11px;color:#aaa;line-height:1.6}
/* bundle */
.bundle-tier{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #141414}
.bundle-tier .bt-label{font-size:10px;color:#888}
.bundle-tier .bt-val{font-size:10px;font-weight:700;color:#f59e0b}
.do-dont{display:flex;gap:10px;margin-top:12px}
.do-dont .col{flex:1}
.do-dont .col-title{font-size:9px;font-weight:700;margin-bottom:5px}
.do-dont .col-item{font-size:9px;line-height:1.7}
/* manager */
#manager{flex:1;overflow-y:auto;padding:14px}
.mgr-card{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.mgr-card .mc-label{font-size:9px;color:#444;letter-spacing:.12em;margin-bottom:8px}
.overall-pct{font-size:30px;font-weight:700;color:#fff;line-height:1}
.overall-pct span{font-size:14px;color:#444}
.overall-sub{font-size:9px;color:#444;margin-top:3px}
.stat-row{display:flex;gap:12px;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-item .si-val{font-size:18px;font-weight:700}
.stat-item .si-label{font-size:7px;color:#333;letter-spacing:.1em}
.overall-bar{margin-top:10px;height:5px;background:#1a1a1a;border-radius:3px}
.overall-bar-fill{height:5px;border-radius:3px;background:linear-gradient(90deg,#22d3ee,#22c55e);transition:width .5s}
.rep-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rep-rank{width:18px;font-size:9px;color:#333;font-weight:700}
.rep-name{width:65px;font-size:10px;font-weight:700;color:#ccc}
.rep-bar-wrap{flex:1;height:18px;background:#141414;border-radius:3px;overflow:hidden;position:relative}
.rep-bar-fill{height:100%;background:rgba(34,197,94,.1)}
.rep-bar-label{position:absolute;inset:0;display:flex;align-items:center;padding-left:6px;gap:6px}
.rep-bar-label .rbl-done{font-size:8px;color:#22c55e;font-weight:700}
.rep-bar-label .rbl-skip{font-size:8px;color:#ef4444}
.rep-meta{font-size:7px;color:#252525;text-align:right;min-width:70px}
.zone-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-bottom:12px}
.zone-card{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:8px;padding:12px 14px;cursor:pointer}
.zone-card.active{border-color:rgba(255,255,255,.2)}
.zc-header{display:flex;justify-content:space-between;align-items:flex-start}
.zc-name{font-size:12px;font-weight:700}
.zc-sub{font-size:7px;color:#333}
.zc-pct{font-size:20px;font-weight:700;color:#fff;line-height:1}
.zc-pct span{font-size:9px;color:#444}
.zc-stats{display:flex;gap:12px;margin-top:8px}
.zc-stat .zcs-val{font-size:13px;font-weight:700}
.zc-stat .zcs-label{font-size:7px;color:#252525}
.zc-bar{margin-top:6px;height:3px;background:#1a1a1a;border-radius:2px}
.zc-bar-fill{height:3px;border-radius:2px;transition:width .4s}
.nb-breakdown{margin-top:10px;border-top:1px solid #1c1c1c;padding-top:8px;display:flex;flex-direction:column;gap:5px}
.nbb-row .nbb-header{display:flex;justify-content:space-between}
.nbb-row .nbb-name{font-size:8px;color:#555;flex:1;padding-right:8px}
.nbb-row .nbb-pct{font-size:8px;font-weight:700;color:#333}
.nbb-bar{margin-top:2px;height:2px;background:#161616;border-radius:1px}
.nbb-bar-fill{height:2px;border-radius:1px}
.nbb-stat{font-size:7px;color:#252525;margin-top:1px}
.log-table{display:flex;flex-direction:column;max-height:280px;overflow-y:auto}
.lt-row{display:flex;gap:8px;align-items:center;padding:3px 0;border-bottom:1px solid #0e0e0e}
.lt-time{font-size:7px;color:#222;min-width:65px}
.lt-rep{font-size:8px;font-weight:700;color:#666;min-width:50px}
.lt-action{font-size:7px;font-weight:700;min-width:38px}
.lt-street{font-size:8px;color:#333;flex:1}
.lt-zone{font-size:7px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="modal-bg">
  <div class="modal">
    <div style="font-size:22px;font-weight:700;color:#22d3ee;margin-bottom:2px;letter-spacing:-.02em">AJ Home Services</div>
    <div style="font-size:9px;color:#444;letter-spacing:.15em;margin-bottom:22px">D2D CREW PORTAL</div>
    <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off"/>
    <div id="pw-error" class="err-msg" style="display:none">Incorrect password</div>
    <button class="btn-primary" onclick="checkPw()">Enter →</button>
    <div style="font-size:9px;color:#2a2a2a;margin-top:14px">AJ Home Services · Summer 2026</div>
  </div>
</div>

<!-- REP NAME MODAL -->
<div id="rep-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <div style="font-size:9px;color:#444;letter-spacing:.2em;margin-bottom:6px">AJ HOME SERVICES</div>
    <h2>Who are you?</h2>
    <p>Your name shows in the log so Andrew can see who knocked what.</p>
    <input type="text" id="rep-input" placeholder="Your first name..."/>
    <button class="btn-primary" onclick="saveRep()">Let's Go →</button>
  </div>
</div>

<!-- PIN MODAL -->
<div id="pin-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <div style="font-size:9px;color:#444;letter-spacing:.2em;margin-bottom:6px">MANAGER ACCESS</div>
    <h2 style="font-size:18px">Enter PIN</h2>
    <p>Manager view only.</p>
    <input type="password" inputmode="numeric" id="pin-input" placeholder="••••" style="font-size:22px;letter-spacing:.3em"/>
    <div id="pin-error" class="err-msg" style="display:none">Incorrect PIN</div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closePinModal()">Cancel</button>
      <button class="btn-primary" style="flex:1;width:auto" onclick="checkPin()">Unlock</button>
    </div>
  </div>
</div>

<!-- MAIN APP (hidden until login) -->
<div id="app" style="display:none;flex-direction:column;flex:1;min-height:100vh">

  <!-- HEADER -->
  <div id="header">
    <div>
      <div class="sub">AJ Home Services · Summer 2026</div>
      <div class="logo">D2D Crew Portal</div>
      <div class="stats" id="hdr-stats">Loading...</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
      <div class="nav-tabs">
        <button id="tab-field" class="active" onclick="switchView('field')">🚪</button>
        <button id="tab-resources" onclick="switchView('resources')">📋</button>
        <button id="tab-manager" onclick="onManagerTab()">📊🔒</button>
      </div>
      <div class="sync-bar">
        <span id="sync-status">●</span>
        <button class="icon-btn" onclick="showRepModal()">👤 <span id="rep-display"></span></button>
        <button class="icon-btn" onclick="loadData()">↻</button>
      </div>
    </div>
  </div>

  <!-- FIELD VIEW -->
  <div id="view-field" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div id="zone-tabs"></div>
    <div id="zone-meta"></div>
    <div id="field-layout">
      <div id="nb-sidebar"></div>
      <div id="street-pane"></div>
    </div>
    <div id="bottom-bar">
      <div class="bb-bar"><div class="bb-fill" id="bb-fill"></div></div>
      <div class="bb-stat" id="bb-stat"></div>
    </div>
  </div>

  <!-- RESOURCES VIEW -->
  <div id="view-resources" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div id="resources">
      <div class="res-tabs">
        <button id="res-tab-pricing" class="active" onclick="switchResTab('pricing')">💰 Pricing</button>
        <button id="res-tab-script" onclick="switchResTab('script')">📝 Script</button>
      </div>
      <div class="res-content" id="res-pricing"></div>
      <div class="res-content" id="res-script" style="display:none"></div>
    </div>
  </div>

  <!-- MANAGER VIEW -->
  <div id="view-manager" style="display:none;flex:1;overflow-y:auto">
    <div id="manager"></div>
  </div>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
const SUPA_URL = 'https://xddvgkiqhchzbdvdulxt.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZHZna2lxaGNoemJkdmR1bHh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjY3ODMsImV4cCI6MjA5NDgwMjc4M30.Kbs2mOAKy7kKgxSJU4YgvxBMxbJh_TnBeJ4iUfsem2Q';
const APP_PW  = '2003';
const MGR_PIN = '1969';

// ── SUPABASE ──────────────────────────────────────────────────────
async function dbGet(key) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/knock_data?key=eq.${key}&select=value`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
    });
    const d = await r.json();
    if (!d || !d.length) return null;
    return JSON.parse(d[0].value);
  } catch { return null; }
}
async function dbSet(key, val) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/knock_data`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ key, value: JSON.stringify(val), updated_at: new Date().toISOString() })
    });
  } catch {}
}

// ── STATE ─────────────────────────────────────────────────────────
let state = { status: {}, extra: {}, log: [] };
let repName = localStorage.getItem('ajhs_rep6') || '';
let pinUnlocked = false;
let activeZoneIdx = 0;
let activeNbIdx = 0;
let expandedStreet = null;
let currentView = 'field';
let currentResTab = 'pricing';
let mgExpandedZone = null;
let saveTimer = null;

// ── ZONES DATA ────────────────────────────────────────────────────
const ZONES = [

const SCRIPT_SECTIONS=[{id:'setup',title:'Before You Knock',color:'#64748b',content:[{h:'Physical Setup',bullets:['AJ Home Services shirt on — visible branding','Clipboard or phone in hand — looks professional','Stand 1–2 steps back from door — less threatening','Feet shoulder width apart — grounded and confident','Hands visible — never in pockets','Smile before the door opens — it carries in your voice']},{h:'Know Before You Knock',bullets:['1–2 neighbor names from Jobber on this street','What services those neighbors booked','Rough home size — look at the house before knocking','If you just finished a job nearby — use that address','Phone charged — you will book and log on the spot','Business cards in pocket for every unanswered door']}]},{id:'opening',title:'Step 1 — The Opening',color:'#22d3ee',content:[{h:'Standard Opening',quote:'"Hey, how\'s it going? I\'m [Name] with AJ Home Services. We\'re actually working on a few homes on your street this week — we just finished [neighbor]\'s place down the block and we\'ve got a couple more tomorrow. We do everything on the exterior — house washing, gutters, windows, solar panels, pressure washing, roof cleaning. While we\'re already set up out here we have some availability and we\'re offering a group rate to neighbors. Is there anything on the exterior you\'ve been meaning to get taken care of?"',cue:'Point down the street toward the neighbor\'s house when you say their name. Make eye contact when you ask the question.'},{h:'Power Version — Just Finished Nearby',quote:'"Hey — I\'m [Name] with AJ Home Services. We literally just finished [neighbor]\'s place right there — [point]. You can probably see the difference from here. While the crew is still set up on your street I wanted to see if there\'s anything we could take care of for you too. What\'s the biggest thing you\'ve been wanting to get done out here?"',cue:'Point directly at the finished house. Let them look. Pause. Then turn back and make eye contact.',note:'Power version converts 2–3x better. Always knock the 5 nearest houses immediately after finishing a job — do not wait.'}]},{id:'qualify',title:'Step 2 — The Qualifying Question',color:'#a78bfa',content:[{h:'If they\'re interested but unsure',quote:'"Let me ask you — when you look at the outside of your house, what bothers you most? Is it the exterior itself, the windows, the gutters, the driveway — or is there something specific you\'ve been putting off?"',cue:'Casually glance around their property. If you spot something obvious, point to it: "I can see your gutters have some buildup up there — is that something on your radar?"',note:'Once they answer, go straight to the matching service branch. Their answer is your roadmap.'}]},{id:'branches',title:'Step 3 — Service Branches',color:'#f59e0b',content:[{h:'1. House Washing / Soft Washing',quote:'"Perfect — that\'s actually what we\'ve been doing all week on your street. We do a soft wash which is way more effective than a regular pressure washer on siding — it gets into the pores and kills the mold and mildew at the root so it stays clean way longer. For a home your size with the group rate we\'re looking at about $[sq ft x $0.30]. You don\'t even need to be home — we text you before and after with photos."',bundle:'While the crew is up on the house anyway — when did you last have the gutters cleared? I can bundle that in for $[gutter price] and you save yourself a separate call later.'},{h:'2. Gutter Cleaning',quote:'"Yeah gutters are one of those things that are easy to forget until they start causing real problems — once they overflow it backs up under the roofline and into the fascia boards. Expensive fix. We go up, completely clear everything out, flush the downspouts, and rinse the roofline. For a home your size with the group rate we\'re at about $[price]. Takes about an hour, crew handles everything."',bundle:'Since the crew is already going to be up on ladders — is the exterior of the house something you\'d want handled at the same time? Most people bundle the house wash and gutters together. One visit, better price.'},{h:'3. Window Cleaning',quote:'"Windows make such a big difference — it changes how the whole house looks from the outside and how much light you get inside. We do full exterior cleaning, tracks, and screens. For hard water stains we have a treatment that removes the mineral buildup that regular cleaning can\'t touch. For a home your size we\'re at about $[price] with the group rate. Usually takes 1–2 hours."',bundle:'If you have solar panels — dirty windows and dirty panels are basically the same problem. We can do both at the same time and I can knock a bit more off. Do you have solar?'},{h:'4. Solar Panel Cleaning',quote:'"Solar panels lose 15–25% of their efficiency when they get dirty — dust, pollen, bird droppings. Most people don\'t realize how much it\'s actually affecting their energy bill. We use a deionized water system that won\'t scratch the panels or void your warranty. For a typical residential system with the group rate it\'s about $[price]. Takes about 45 minutes and you\'ll notice it on your next bill."',bundle:'While we\'re up on the roof area — are the gutters something that needs attention too? Same debris landing on the panels usually means the gutters have buildup as well.'},{h:'5. Pressure Washing',quote:'"Yeah the driveway and concrete are something people notice a lot — it affects how the whole property looks from the street. We do a hot water pressure wash that gets deep into the pores of the concrete and lifts the staining and oil out. For a standard driveway with the group rate we\'re looking at $[price]. If you want sealing done after we can take care of that too — it protects the surface and keeps it clean way longer."',bundle:'And if the house exterior is something you\'ve been thinking about too — soft washing the house and doing the driveway together is a really popular combo.'},{h:'6. Roof Cleaning',quote:'"Those black streaks are actually a bacteria called gloeocapsa magma — it feeds on the limestone in your shingles and spreads over time. Left alone it shortens the life of your roof by years. We do a low pressure soft wash treatment that kills it at the root — same method roofing manufacturers recommend. It won\'t void your warranty and the results last 2–3 years. For a home your size with the group rate we\'re looking at $[price]."',bundle:'While we\'re up there — the gutters are worth checking too. That same debris causing the roof streaking usually ends up in the gutters. I can bundle that in and the crew handles both in one visit.'},{h:'7. Soft Washing — Siding / Fences / Stucco',quote:'"Soft washing is different from a pressure washer — it uses a low pressure application with a solution that kills the mold and algae at the root rather than just blasting the surface. It\'s actually safer for painted surfaces, stucco, and wood, and it stays cleaner longer because you\'re killing the source not just the surface layer. For a fence or surface your size with the group rate we\'re looking at about $[price]."',bundle:'And if the house exterior needs attention too — soft washing the whole property as a package is usually the way to go. Want me to give you a price for the full exterior while I\'m here?'}]},{id:'close',title:'Step 4 — The Close',color:'#22c55e',content:[{h:'Two-option close — use after every pitch',quote:'"So did you want to go ahead and get that locked in? I can get you on the schedule for this week while we\'re already in the neighborhood. What works better — tomorrow or later in the week?"',cue:'Plant your feet. Hold eye contact with a relaxed, expectant expression. The silence after this question is part of the close — do not fill it. First person to speak loses.',note:''},{h:'If they hesitate on the bundle',quote:'"Totally fine — even if you just want to start with the [primary service] today and we come back for the rest, that works too. Want to at least lock in p casually — normalizes the action.',follow:'If spouse isn\'t home: "No problem at all. Let me text you the details right now so you can show them. And can I ask — when do you think you\'d have a chance to chat about it?" [Get a specific day, follow up exactly then.]'},{h:'"We already have someone"',quote:'Buster: "Oh nice — who do you use? [Listen genuinely.] How have they been? Are you happy with them?"',cue:'Lean against the door frame — relaxed posture signals you\'re not threatened. Curiosity, not defensiveness.',follow:'If they hesitate: "I ask because a lot of our clients switched to us after having some inconsistency with their previous company. We document everything with before and after photos on every single job and the owner personally follows up after each visit."'},{h:'"Not right now / maybe later"',quote:'Buster: "Totally understand — when do you think you\'d want to get it done? Summer? Fall? I ask because our schedule fills up fast in peak season and I want to make sure we can get you in."',cue:'When they give a timeframe, write it down visibly on your clipboard or phone.',follow:'If they give a timeframe: "Perfect — what if I reach out in [month they said]? I\'ll put you on our early booking list so you get priority scheduling. What\'s the best number?" [Get their number. Set a Jobber reminder.]'}]},{id:'after',title:'Step 6 — After Every Door',color:'#818cf8',content:[{h:'If they book',bullets:['Get name, number, best day and time','Log in Jobber immediately — do not wait','Confirm text to client within 5 minutes','Knock the 4–5 nearest neighbors right now','Tell manager so crew is scheduled']},{h:'If they don\'t book',bullets:['Leave a business card — every single time','If they gave a number — follow up in 2 days','If they gave a timeframe — set a Jobber reminder','Note address in your daily tracker','Walk away cleanly — never linger or look defeated']}]}];

// ── HELPERS ───────────────────────────────────────────────────────
function getZ() { return ZONES[activeZoneIdx]; }
function getNb() { return getZ().neighborhoods[activeNbIdx]; }
function getStreets() { const z=getZ(),nb=getNb(),k=z.id+'|'+nb.name; return [...nb.streets,...(state.extra[k]||[])]; }
function stOf(zId,nbName,s) { return state.status[zId+'|'+nbName+'|'+s]; }
function calcZone(z) {
  let total=0,done=0,skip=0;
  for(const nb of z.neighborhoods){
    const all=[...nb.streets,...(state.extra[z.id+'|'+nb.name]||[])];
    total+=all.length;
    done+=all.filter(s=>state.status[z.id+'|'+nb.name+'|'+s]==='done').length;
    skip+=all.filter(s=>state.status[z.id+'|'+nb.name+'|'+s]==='skip').length;
  }
  return {total,done,skip,remaining:total-done-skip};
}
function calcNb(zId,nb) {
  const all=[...nb.streets,...(state.extra[zId+'|'+nb.name]||[])];
  return {total:all.length,done:all.filter(s=>state.status[zId+'|'+nb.name+'|'+s]==='done').length,skip:all.filter(s=>state.status[zId+'|'+nb.name+'|'+s]==='skip').length};
}
function calcReps() {
  const r={};
  for(const e of state.log){
    if(!e.rep||e.rep==='Unknown') continue;
    if(!r[e.rep]) r[e.rep]={done:0,skip:0,ts:0,zone:'',date:'',time:''};
    if(e.action==='done') r[e.rep].done++;
    if(e.action==='skip') r[e.rep].skip++;
    if((e.timestamp||0)>r[e.rep].ts){r[e.rep].ts=e.timestamp||0;r[e.rep].zone=e.zone;r[e.rep].date=e.date;r[e.rep].time=e.time;}
  }
  return r;
}

// ── LOAD / SAVE ───────────────────────────────────────────────────
async function loadData() {
  setSyncStatus('syncing');
  const [s,e,l] = await Promise.all([dbGet('knock_status'),dbGet('knock_extra'),dbGet('knock_log')]);
  if(s&&typeof s==='object') state.status=s;
  if(e&&typeof e==='object') state.extra=e;
  if(l&&Array.isArray(l)) state.log=l;
  setSyncStatus('ok');
  renderAll();
}
async function saveStatus() {
  await dbSet('knock_status',state.status);
  showSaveOk();
}
async function saveExtra() { await dbSet('knock_extra',state.extra); }
async function saveLog()   { await dbSet('knock_log',state.log); }

function setSyncStatus(s) {
  const el=document.getElementById('sync-status');
  if(!el) return;
  if(s==='syncing'){el.textContent='⟳ syncing';el.className='syncing';}
  else if(s==='ok'){el.textContent='● '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});el.className='ok';}
}
function showSaveOk() {
  const el=document.getElementById('sync-status');
  if(!el) return;
  el.textContent='✓ saved'; el.className='ok';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>setSyncStatus('ok'),2000);
}

document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
function checkPw() {
  const v=document.getElementById('pw-input').value;
  if(v===APP_PW){
    document.getElementById('login-screen').style.display='none';

  }
}

}

  repName=v;
  localStorage.setItem('ajhs_rep6',v);

  document.getElementById('pin-modal').style.display='flex';

function switchView(v) {
  currentView=v;
  ['field','resources','manager'].forEach(x=>{
    document.getElementById('view-'+x).style.display= x===v?(x==='field'?'flex':'block'):'none';

  ['pricing','script'].forEach(x=>{
    document.getElementById('res-'+x).style.display=x===t?'block':'none';
    document.getElementById('res-tab-'+x).classList.toggle('active',x===t);
  });

// ── RENDER ALL ────────────────────────────────────────────────────
function renderAll() {
  renderHeader();
  renderZoneTabs();
  renderZoneMeta();
  renderSidebar();
  renderStreets();
  renderBottomBar();
  document.getElementById('rep-display').textContent=repName;
}

function renderHeader() {
  const tot=ZONES.reduce((a,z)=>a+calcZone(z).total,0);
  const done=ZONES.reduce((a,z)=>a+calcZone(z).done,0);
  const pct=tot>0?Math.round(done/tot*100):0;
  document.getElementById('hdr-stats').innerHTML=`${tot} streets · <span>${done} knocked (${pct}%)</span>`;
}

function renderZoneTabs() {
  const el=document.getElementById('zone-tabs');
  el.innerHTML=ZONES.map((z,i)=>{
    const s=calcZone(z);
    const pct=s.total>0?Math.round(s.done/s.total*100):0;
    return `<button style="--zc:${z.color}" class="${i===activeZoneIdx?'active':''}" onclick="selectZone(${i})"><span style="font-size:7px;color:${z.color};opacity:.4;margin-right:3px">W${z.weeks}</span>${z.name}${pct>0?`<span style="margin-left:4px;font-size:7px;color:${pct===100?'#22c55e':z.color}">${pct}%</span>`:''}</button>`;
  }).join('');
}

function renderZoneMeta() {
  const z=getZ();
  document.getElementById('zone-meta').style.background=z.color+'07';
  document.getElementById('zone-meta').style.borderBottomColor=z.color+'15';
  document.getElementById('zone-meta').innerHTML=`
    <div class="meta-item"><span class="meta-label">WK</span><span class="meta-val" style="color:${z.color}">${z.weeks}</span></div>
    <div class="meta-item"><span class="meta-label">AVG</span><span class="meta-val" style="color:#aaa">${z.avgHome}</span></div>
    <div class="meta-item"><span class="meta-label">TIER</span><span class="meta-val" style="color:${{A:'#22c55e',B:'#f59e0b',C:'#64748b'}[z.tier]}">${z.tier}</span></div>
    <div class="note">${z.note}</div>`;
}

function renderSidebar() {
  const z=getZ();
  let html=z.neighborhoods.map((nb,i)=>{
    const s=calcNb(z.id,nb);
    const pct=s.total>0?((s.done+s.skip)/s.total*100):0;
    return `<div class="nb-item ${i===activeNbIdx?'active':''}" style="--zc:${z.color}" onclick="selectNb(${i})">
      <div class="nb-name">${nb.name}</div>
      <div class="nb-days">${nb.days}</div>
      <div class="nb-stat">${s.done}/${s.total} · ${s.skip} skip</div>
      ${pct>0?`<div class="nb-progress"><div class="nb-progress-fill" style="width:${pct}%;background:${z.color}60"></div></div>`:''}
    </div>`;
  }).join('');
  html+=`<div class="recent-label">RECENT</div>`;
  html+=state.log.slice(0,6).map(e=>`<div class="log-item"><div class="li-rep" style="color:#282828"><span style="color:#383838;font-weight:700">${e.rep}</span> <span style="color:${e.action==='done'?'#1a4a1a':e.action==='skip'?'#4a1a1a':'#2a2a2a'}">${e.action}</span></div><div class="li-street">${e.street} · ${e.time}</div></div>`).join('');
  document.getElementById('nb-sidebar').innerHTML=html;
}

function renderStreets() {
  const z=getZ(), nb=getNb(), streets=getStreets();
  let html=`<div class="street-header"><h3>${nb.name}</h3><div class="sh-meta">📆 ${nb.days} · ${streets.length} streets</div><div class="street-hint">✓ knocked full street &nbsp;·&nbsp; ✗ skip (flags for Andrew)</div></div><div class="streets-list">`;
  streets.forEach((s,i)=>{
    const isAdded=i>=nb.streets.length;
    const val=stOf(z.id,nb.name,s);
    const done=val==='done', skip=val==='skip';
    const k=z.id+'|'+nb.name+'|'+s;
    const open=expandedStreet===k;
    html+=`<div class="street-row ${done?'done':skip?'skip':''}" id="sr-${i}">
      <div class="sr-inner" onclick="toggleExpand('${k}')">
        <div class="street-num" style="color:${z.color}">${String(i+1).padStart(2,'0')}</div>
        <div class="street-name">${s}${isAdded?'<span class="added-badge">ADDED</span>':''}</div>
        <div class="sr-btns" onclick="event.stopPropagation()">
          <button class="sr-btn done-btn ${done?'active':''}" onclick="toggleStreet('${z.id}','${nb.name.replace(/'/g,"\\'")}','${s.replace(/'/g,"\\'")}','done')">✓</button>
          <button class="sr-btn skip-btn ${skip?'active':''}" onclick="toggleStreet('${z.id}','${nb.name.replace(/'/g,"\\'")}','${s.replace(/'/g,"\\'")}','skip')">✗</button>
          ${isAdded?`<button class="sr-btn del-btn" onclick="removeStreet('${z.id}','${nb.name.replace(/'/g,"\\'")}','${s.replace(/'/g,"\\'")}')">🗑</button>`:''}
        </div>
      </div>
      ${open?`<div class="sr-detail"><div>• Knock every single-family home on ${s} end to end</div><div>• Skip apartments, condos, gated driveways</div><div>• No answer → leave door hanger, log in Jobber</div><div>• ✓ full street done &nbsp; ✗ to flag for Andrew</div></div>`:''}
    </div>`;
  });
  html+=`</div><div class="add-street"><input id="new-street-input" placeholder="Add a street found on the ground..." onkeydown="if(event.key==='Enter')addStreet()"/><button style="border:1px solid ${z.color}30;background:${z.color}10;color:${z.color}" onclick="addStreet()">+ Add</button></div>`;
  document.getElementById('street-pane').innerHTML=html;
}

function renderBottomBar() {
  const z=getZ(), nb=getNb(), streets=getStreets();
  const done=streets.filter(s=>stOf(z.id,nb.name,s)==='done').length;
  const skip=streets.filter(s=>stOf(z.id,nb.name,s)==='skip').length;
  const left=streets.filter(s=>!stOf(z.id,nb.name,s)).length;
  const pct=streets.length>0?done/streets.length*100:0;
  document.getElementById('bb-fill').style.width=pct+'%';
  document.getElementById('bb-fill').style.background=z.color;
  document.getElementById('bb-stat').textContent=`${done} knocked · ${skip} skip · ${left} left`;
}

// ── INTERACTIONS ──────────────────────────────────────────────────
function selectZone(i) { activeZoneIdx=i; activeNbIdx=0; expandedStreet=null; renderAll(); }
function selectNb(i)   { activeNbIdx=i; expandedStreet=null; renderStreets(); renderSidebar(); renderBottomBar(); }
function toggleExpand(k) { expandedStreet=expandedStreet===k?null:k; renderStreets(); }

async function toggleStreet(zId,nbName,street,val) {
  const k=zId+'|'+nbName+'|'+street;
  if(state.status[k]===val) delete state.status[k]; else state.status[k]=val;
  const entry={
    time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
    date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}),
    timestamp:Date.now(), rep:repName||'Unknown',
    action:state.status[k]||'cleared', street, zone:zId
  };
  state.log=[entry,...state.log].slice(0,200);
  renderStreets(); renderSidebar(); renderBottomBar(); renderHeader();
  await saveStatus();
  await saveLog();
}

async function addStreet() {
  const inp=document.getElementById('new-street-input');
  if(!inp||!inp.value.trim()) return;
  const nb=getNb(), z=getZ(), k=z.id+'|'+nb.name;
  state.extra[k]=[...(state.extra[k]||[]),inp.value.trim()];
  inp.value='';
  renderStreets(); renderBottomBar();
  await saveExtra();
}

async function removeStreet(zId,nbName,street) {
  const k=zId+'|'+nbName;
  state.extra[k]=(state.extra[k]||[]).filter(s=>s!==street);
  delete state.status[zId+'|'+nbName+'|'+street];
  renderStreets(); renderBottomBar();
  await saveExtra(); await saveStatus();
}

      pricing_html += '<tr><td style="font-size:10px;color:#aaa;padding:5px 0;border-bottom:1px solid #111;width:35%">'+r[0]+'</td><td style="font-size:10px;font-weight:700;color:'+s.color+';padding:5px 0;border-bottom:1px solid #111;width:25%">'+r[1]+'</td><td style="font-size:9px;color:#555;padding:5px 0;border-bottom:1px solid #111">'+r[2]+'</td></tr>';
    });
    pricing_html += '</table>';
    if (s.note) pricing_html += '<div style="margin-top:8px;font-size:10px;color:#555;background:#111;border-radius:5px;padding:7px 10px;line-height:1.6;border-left:2px solid rgba(255,255,255,.1)">'+s.note+'</div>';
    pricing_html += '</div></div>';
  });

  // Bundle section
  pricing_html += '<div class="collapsible"><button class="coll-header" onclick="toggleSection(\'sec-bundle\')" style="width:100%;background:#0f0f0f;border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;text-align:left;cursor:pointer"><span style="font-size:11px;font-weight:700;color:#f59e0b">Bundle Discounts - Your Closing Tool</span><span class="arrow" style="font-size:12px;color:#444"> v</span></button>';
  pricing_html += '<div id="sec-bundle" style="display:none;background:#0c0c0c;border:1px solid #161616;border-top:none;border-radius:0 0 8px 8px;padding:10px 14px">';
  pricing_html += '<div style="font-size:10px;color:#777;margin-bottom:10px;line-height:1.5">Quote both services at full price first. If they hesitate say: If we book both today I can knock $50 off the total. Make them earn it.</div>';
  pricing_html += '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #141414"><span style="font-size:10px;color:#888">Any 2 services booked together</span><span style="font-size:10px;font-weight:700;color:#f59e0b">$50 off</span></div>';
  pricing_html += '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #141414"><span style="font-size:10px;color:#888">High-ticket bundle (well above min)</span><span style="font-size:10px;font-weight:700;color:#f59e0b">Up to $100 off</span></div>';
  pricing_html += '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #141414"><span style="font-size:10px;color:#888">Anything beyond $100 off</span><span style="font-size:10px;font-weight:700;color:#f59e0b">Manager approval required</span></div>';
  pricing_html += '<div style="display:flex;gap:10px;margin-top:12px">';
  pricing_html += '<div style="flex:1"><div style="font-size:9px;font-weight:700;color:#22c55e;margin-bottom:5px">DO</div>';
  var dos = ['Quote full price first','Lead with higher end of range','Use bundle only when closing','Make customer earn the discount','Charge for hard-to-reach work','Confirm screen removal liability'];
  dos.forEach(function(d){pricing_html+='<div style="font-size:9px;color:#1a4a1a;line-height:1.7">+ '+d+'</div>';});
  pricing_html += '</div><div style="flex:1"><div style="font-size:9px;font-weight:700;color:#ef4444;margin-bottom:5px">DON'T</div>';
  var donts = ['Open with bundle price','Drop below minimums without approval','Throw in haul-away for free','Quote pavers on the door','Discount the discount','Promise free screens unless $100+ above min'];
  donts.forEach(function(d){pricing_html+='<div style="font-size:9px;color:#4a1a1a;line-height:1.7">- '+d+'</div>';});
  pricing_html += '</div></div></div></div>';
  
  document.getElementById('res-pricing').innerHTML = pricing_html;

  // SCRIPT
  var script_html = '<div style="font-size:10px;color:#444;margin-bottom:12px;line-height:1.5">One opening. One qualifying question. Match to their need. Bust the smokescreen. Close.</div>';
  
  var sections = [
    {id:'s0', title:'Before You Knock', color:'#64748b', html:'<div style="font-size:10px;font-weight:700;color:#64748b;margin-bottom:5px">Physical Setup</div><div style="display:flex;flex-direction:column;gap:2px;margin-bottom:10px"><div style="font-size:11px;color:#aaa;line-height:1.6">+ AJ Home Services shirt on - visible branding</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Clipboard or phone in hand - looks professional</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Stand 1-2 steps back from door - less threatening</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Feet shoulder width apart - grounded and confident</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Hands visible - never in pockets</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Smile before the door opens - it carries in your voice</div></div><div style="font-size:10px;font-weight:700;color:#64748b;margin-bottom:5px">Know Before You Knock</div><div style="display:flex;flex-direction:column;gap:2px"><div style="font-size:11px;color:#aaa;line-height:1.6">+ 1-2 neighbor names from Jobber on this street</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ What services those neighbors booked</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Rough home size - look at the house before knocking</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Phone charged - you will book and log on the spot</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Business cards in pocket for every unanswered door</div></div>'},
    {id:'s1', title:'Step 1 - The Opening', color:'#22d3ee', html:'<div style="font-size:10px;font-weight:700;color:#22d3ee;margin-bottom:5px">Standard Opening</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(34,211,238,.3);margin-bottom:8px">Hey, how's it going? I'm [Name] with AJ Home Services. We're actually working on a few homes on your street this week - we just finished [neighbor]'s place down the block. We do everything on the exterior - house washing, gutters, windows, solar panels, pressure washing, roof cleaning. While we're already set up out here we have some availability and we're offering a group rate to neighbors. Is there anything on the exterior you've been meaning to get taken care of?</div><div style="font-size:10px;color:#555;background:#0e0e0e;border-radius:5px;padding:5px 8px;border-left:2px solid #333;margin-bottom:10px">Point down the street toward the neighbor's house when you say their name. Make eye contact when you ask the question.</div><div style="font-size:10px;font-weight:700;color:#22d3ee;margin-bottom:5px">Power Version - Just Finished Nearby</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(34,211,238,.3);margin-bottom:8px">Hey - I'm [Name] with AJ Home Services. We literally just finished [neighbor]'s place right there. You can probably see the difference from here. While the crew is still set up on your street I wanted to see if there's anything we could take care of for you too. What's the biggest thing you've been wanting to get done out here?</div><div style="font-size:10px;color:#f59e0b;background:#1a1000;border-radius:5px;padding:5px 8px">Power version converts 2-3x better. Always knock the 5 nearest houses immediately after finishing a job - do not wait.</div>'},
    {id:'s2', title:'Step 2 - The Qualifying Question', color:'#a78bfa', html:'<div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(167,139,250,.3);margin-bottom:8px">Let me ask you - when you look at the outside of your house, what bothers you most? Is it the exterior itself, the windows, the gutters, the driveway - or is there something specific you've been putting off?</div><div style="font-size:10px;color:#555;background:#0e0e0e;border-radius:5px;padding:5px 8px;border-left:2px solid #333;margin-bottom:6px">Casually glance around their property. If you spot something obvious, point to it.</div><div style="font-size:10px;color:#f59e0b;background:#1a1000;border-radius:5px;padding:5px 8px">Once they answer, go straight to the matching service branch below. Their answer is your roadmap.</div>'},
    {id:'s3', title:'Step 3 - Service Branches', color:'#f59e0b', html:'<div style="font-size:10px;color:#555;margin-bottom:10px">Use the branch that matches what they said they need.</div><div style="font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:4px">1. House Washing</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(245,158,11,.3);margin-bottom:6px">Perfect - that's actually what we've been doing all week on your street. We do a soft wash which is way more effective than a regular pressure washer on siding - it gets into the pores and kills the mold and mildew at the root so it stays clean way longer. For a home your size with the group rate we're looking at about $[price]. You don't even need to be home - we text you before and after with photos.</div><div style="font-size:10px;color:#22c55e;background:#0a1a0a;border-radius:5px;padding:5px 8px;border-left:2px solid rgba(34,197,94,.25);margin-bottom:12px">Bundle: While the crew is up on the house anyway - when did you last have the gutters cleared? I can bundle that in and you save yourself a separate call later.</div><div style="font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:4px">2. Gutter Cleaning</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(245,158,11,.3);margin-bottom:6px">Yeah gutters are one of those things that are easy to forget until they start causing real problems - once they overflow it backs up under the roofline and into the fascia boards. Expensive fix. We go up, completely clear everything out, flush the downspouts, and rinse the roofline. For a home your size with the group rate we're at about $[price]. Takes about an hour.</div><div style="font-size:10px;color:#22c55e;background:#0a1a0a;border-radius:5px;padding:5px 8px;border-left:2px solid rgba(34,197,94,.25);margin-bottom:12px">Bundle: Since the crew is already going to be up on ladders - is the exterior of the house something you'd want handled at the same time?</div><div style="font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:4px">3. Window Cleaning</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(245,158,11,.3);margin-bottom:6px">Windows make such a big difference - it changes how the whole house looks from the outside and how much light you get inside. We do full exterior cleaning, tracks, and screens. For hard water stains we have a treatment that removes the mineral buildup that regular cleaning can't touch. For a home your size we're at about $[price] with the group rate.</div><div style="font-size:10px;color:#22c55e;background:#0a1a0a;border-radius:5px;padding:5px 8px;border-left:2px solid rgba(34,197,94,.25);margin-bottom:12px">Bundle: If you have solar panels - dirty windows and dirty panels are basically the same problem. Do you have solar?</div><div style="font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:4px">4. Solar Panel Cleaning</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(245,158,11,.3);margin-bottom:6px">Solar panels lose 15-25% of their efficiency when they get dirty. Most people don't realize how much it's actually affecting their energy bill. We use a deionized water system that won't scratch the panels or void your warranty. For a typical residential system with the group rate it's about $[price].</div><div style="font-size:10px;color:#22c55e;background:#0a1a0a;border-radius:5px;padding:5px 8px;border-left:2px solid rgba(34,197,94,.25);margin-bottom:12px">Bundle: While we're up on the roof area - are the gutters something that needs attention too?</div><div style="font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:4px">5. Pressure Washing</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(245,158,11,.3);margin-bottom:6px">Yeah the driveway and concrete are something people notice a lot. We do a hot water pressure wash that gets deep into the pores of the concrete and lifts the staining and oil out. For a standard driveway with the group rate we're looking at $[price].</div><div style="font-size:10px;color:#22c55e;background:#0a1a0a;border-radius:5px;padding:5px 8px;border-left:2px solid rgba(34,197,94,.25);margin-bottom:12px">Bundle: And if the house exterior is something you've been thinking about too - soft washing the house and doing the driveway together is a really popular combo.</div><div style="font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:4px">6. Roof Cleaning</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(245,158,11,.3);margin-bottom:6px">Those black streaks are actually a bacteria called gloeocapsa magma - it feeds on the limestone in your shingles and spreads over time. Left alone it shortens the life of your roof by years. We do a low pressure soft wash treatment that kills it at the root. Results last 2-3 years. For a home your size with the group rate we're looking at $[price].</div><div style="font-size:10px;color:#22c55e;background:#0a1a0a;border-radius:5px;padding:5px 8px;border-left:2px solid rgba(34,197,94,.25)">Bundle: While we're up there - the gutters are worth checking too. I can bundle that in and the crew handles both in one visit.</div>'},
    {id:'s4', title:'Step 4 - The Close', color:'#22c55e', html:'<div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(34,197,94,.3);margin-bottom:8px">So did you want to go ahead and get that locked in? I can get you on the schedule for this week while we're already in the neighborhood. What works better - tomorrow or later in the week?</div><div style="font-size:10px;color:#555;background:#0e0e0e;border-radius:5px;padding:5px 8px;border-left:2px solid #333;margin-bottom:10px">Plant your feet. Hold eye contact. The silence after this question is part of the close - do not fill it. First person to speak loses.</div><div style="font-size:10px;font-weight:700;color:#22c55e;margin-bottom:4px">If they hesitate on the bundle</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(34,197,94,.3);margin-bottom:6px">Totally fine - even if you just want to start with the [primary service] today and we come back for the rest, that works too. Want to at least lock in the [primary service] while the group rate is available?</div><div style="font-size:10px;color:#f59e0b;background:#1a1000;border-radius:5px;padding:5px 8px">One service booked is infinitely better than zero. Never leave empty-handed if there is any interest at all.</div>'},
    {id:'s5', title:'Step 5 - Smokescreen Objections', color:'#f43f5e', html:'<div style="font-size:10px;color:#555;margin-bottom:10px;line-height:1.5">A smokescreen is a polite way of saying no without saying no. Ask one more genuine question to find the real barrier.</div><div style="font-size:10px;color:#f43f5e;background:#1a0000;border-radius:5px;padding:6px 9px;margin-bottom:12px">Universal buster: "Hey - totally respect that. Can I ask honestly - is it a hard no or more of a not right now?"</div><div style="font-size:10px;font-weight:700;color:#f43f5e;margin-bottom:4px">"I need to think about it"</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(244,63,94,.3);margin-bottom:6px">Totally get that. Can I ask - is it more about the timing, the price, or just not sure if you need it done right now? I want to make sure I answered everything before I leave.</div><div style="font-size:10px;color:#818cf8;background:#0a0a1a;border-radius:5px;padding:5px 8px;margin-bottom:12px">If price: "I hear you - the group rate is the best I can do while we're on your street. If it helps I can break it into two visits so it's not all at once."</div><div style="font-size:10px;font-weight:700;color:#f43f5e;margin-bottom:4px">"Send me some info"</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(244,63,94,.3);margin-bottom:6px">Of course - what's the best number? I'll text you right now so you have it. And honestly the best way to see our work is the before and after photos - let me pull one up real quick.</div><div style="font-size:10px;color:#818cf8;background:#0a0a1a;border-radius:5px;padding:5px 8px;margin-bottom:12px">After photos: "Pretty dramatic right? That's a house two streets over. Is that the kind of result you'd want for yours?"</div><div style="font-size:10px;font-weight:700;color:#f43f5e;margin-bottom:4px">"I have to ask my spouse"</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(244,63,94,.3);margin-bottom:6px">Absolutely makes sense. Is he/she home right now? I can take two minutes to walk you both through it. Or a lot of couples just do a quick text - want to shoot them a message right now while I'm here?</div><div style="font-size:10px;color:#818cf8;background:#0a0a1a;border-radius:5px;padding:5px 8px;margin-bottom:12px">If not home: "Let me text you the details right now so you can show them. When do you think you'd have a chance to chat about it?" Get a specific day and follow up exactly then.</div><div style="font-size:10px;font-weight:700;color:#f43f5e;margin-bottom:4px">"We already have someone"</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(244,63,94,.3);margin-bottom:6px">Oh nice - who do you use? How have they been? Are you happy with them?</div><div style="font-size:10px;color:#818cf8;background:#0a0a1a;border-radius:5px;padding:5px 8px;margin-bottom:12px">If they hesitate: "A lot of our clients switched to us after having some inconsistency. We document everything with before and after photos and the owner personally follows up after each visit."</div><div style="font-size:10px;font-weight:700;color:#f43f5e;margin-bottom:4px">"Not right now / maybe later"</div><div style="font-size:11px;color:#ccc;line-height:1.7;background:#111;border-radius:6px;padding:8px 10px;border-left:2px solid rgba(244,63,94,.3);margin-bottom:6px">Totally understand - when do you think you'd want to get it done? Summer? Fall? I ask because our schedule fills up fast in peak season.</div><div style="font-size:10px;color:#818cf8;background:#0a0a1a;border-radius:5px;padding:5px 8px">If they give a timeframe: "Perfect - what if I reach out in [month]? I'll put you on our early booking list so you get priority scheduling. What's the best number?"</div>'},
    {id:'s6', title:'Step 6 - After Every Door', color:'#818cf8', html:'<div style="font-size:10px;font-weight:700;color:#818cf8;margin-bottom:5px">If they book</div><div style="display:flex;flex-direction:column;gap:2px;margin-bottom:12px"><div style="font-size:11px;color:#aaa;line-height:1.6">+ Get name, number, best day and time</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Log in Jobber immediately - do not wait</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Confirm text to client within 5 minutes</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Knock the 4-5 nearest neighbors right now</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Tell manager so crew is scheduled</div></div><div style="font-size:10px;font-weight:700;color:#818cf8;margin-bottom:5px">If they don't book</div><div style="display:flex;flex-direction:column;gap:2px"><div style="font-size:11px;color:#aaa;line-height:1.6">+ Leave a business card - every single time</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ If they gave a number - follow up in 2 days</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ If they gave a timeframe - set a Jobber reminder</div><div style="font-size:11px;color:#aaa;line-height:1.6">+ Walk away cleanly - never linger or look defeated</div></div>'}
  ];
  
  sections.forEach(function(sec) {
    script_html += '<div class="collapsible" style="margin-bottom:8px">';
    script_html += '<button class="coll-header" onclick="toggleSection(\'sec-'+sec.id+'\')" style="width:100%;background:#0f0f0f;border:1px solid #1a1a1a;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;text-align:left;cursor:pointer">';
    script_html += '<span style="font-size:11px;font-weight:700;color:'+sec.color+'">'+sec.title+'</span>';
    script_html += '<span class="arrow" style="font-size:12px;color:#444"> v</span></button>';
    script_html += '<div id="sec-'+sec.id+'" style="display:none;background:#0c0c0c;border:1px solid #161616;border-top:none;border-radius:0 0 8px 8px;padding:12px 14px">';
    script_html += sec.html;
    script_html += '</div></div>';
  });
  
  document.getElementById('res-script').innerHTML = script_html;
}



// ── MANAGER ───────────────────────────────────────────────────────
function renderManager() {
  const tot=ZONES.reduce((a,z)=>a+calcZone(z).total,0);
  const done=ZONES.reduce((a,z)=>a+calcZone(z).done,0);
  const skip=ZONES.reduce((a,z)=>a+calcZone(z).skip,0);
  const pct=tot>0?Math.round(done/tot*100):0;
  const reps=calcReps();
  const maxDone=Math.max(...Object.values(reps).map(r=>r.done),1);

  let html=`<div class="mgr-card">
    <div class="mc-label">SUMMER CAMPAIGN OVERALL</div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
      <div><div class="overall-pct">${pct}<span>%</span></div><div class="overall-sub">${done.toLocaleString()} knocked · ${skip} skipped · ${(tot-done-skip).toLocaleString()} remaining</div></div>
      <div class="stat-row">
        ${[['TOTAL',tot,'#555'],['KNOCKED',done,'#22c55e'],['SKIPPED',skip,'#ef4444'],['LEFT',tot-done-skip,'#f59e0b']].map(([l,v,c])=>`<div class="stat-item"><div class="si-val" style="color:${c}">${v}</div><div class="si-label">${l}</div></div>`).join('')}
      </div>
    </div>
    <div class="overall-bar"><div class="overall-bar-fill" style="width:${pct}%"></div></div>
  </div>`;

  html+=`<div class="mgr-card"><div class="mc-label">REP ACTIVITY</div>`;
  if(!Object.keys(reps).length) {
    html+=`<div style="font-size:10px;color:#252525">No activity yet.</div>`;
  } else {
    Object.entries(reps).sort((a,b)=>b[1].done-a[1].done).forEach(([name,d],i)=>{
      const zcolor=ZONES.find(z=>z.id===d.zone)?.color||'#333';
      html+=`<div class="rep-row">
        <div class="rep-rank">#${i+1}</div>
        <div class="rep-name">${name}</div>
        <div class="rep-bar-wrap"><div class="rep-bar-fill" style="width:${d.done/maxDone*100}%"></div>
          <div class="rep-bar-label"><span class="rbl-done">${d.done} knocked</span>${d.skip>0?`<span class="rbl-skip">${d.skip} skip</span>`:''}</div>
        </div>
        <div class="rep-meta"><div>${d.date} ${d.time}</div><div style="color:${zcolor}">${d.zone}</div></div>
      </div>`;
    });
  }
  html+=`</div>`;

  html+=`<div style="font-size:9px;color:#444;letter-spacing:.12em;margin-bottom:8px">ZONE BREAKDOWN</div><div class="zone-grid">`;
  ZONES.forEach(z=>{
    const s=calcZone(z);
    const pct=s.total>0?Math.round(s.done/s.total*100):0;
    const active=mgExpandedZone===z.id;
    html+=`<div class="zone-card ${active?'active':''}" style="${active?'border-color:'+z.color+'40;background:'+z.color+'0e':''}" onclick="toggleMgZone('${z.id}')">
      <div class="zc-header">
        <div><div class="zc-name" style="color:${z.color}">${z.name}</div><div class="zc-sub">Wk ${z.weeks} · ${z.avgHome} · Tier ${z.tier}</div></div>
        <div class="zc-pct" style="color:${pct===100?'#22c55e':'#fff'}">${pct}<span>%</span></div>
      </div>
      <div class="zc-stats">
        ${[['knocked',s.done,'#22c55e'],['skip',s.skip,'#ef4444'],['left',s.remaining,'#444']].map(([l,v,c])=>`<div class="zc-stat"><div class="zcs-val" style="color:${c}">${v}</div><div class="zcs-label">${l.toUpperCase()}</div></div>`).join('')}
      </div>
      <div class="zc-bar"><div class="zc-bar-fill" style="width:${pct}%;background:${z.color}"></div></div>
      ${active?`<div class="nb-breakdown">${z.neighborhoods.map(nb=>{const ns=calcNb(z.id,nb);const np=ns.total>0?Math.round(ns.done/ns.total*100):0;return`<div class="nbb-row"><div class="nbb-header"><div class="nbb-name">${nb.name}</div><div class="nbb-pct" style="color:${np===100?'#22c55e':'#333'}">${np}%</div></div><div class="nbb-bar"><div class="nbb-bar-fill" style="width:${np}%;background:${z.color}80"></div></div><div class="nbb-stat">${ns.done}/${ns.total} · ${ns.skip} skip</div></div>`;}).join('')}</div>`:''}
    </div>`;
  });
  html+=`</div>`;

  html+=`<div class="mgr-card"><div class="mc-label">ACTIVITY LOG</div>`;
  if(!state.log.length){html+=`<div style="font-size:10px;color:#252525">No activity yet.</div>`;}
  else {
    html+=`<div class="log-table">`;
    state.log.forEach(e=>{
      const zc=ZONES.find(z=>z.id===e.zone)?.color||'#444';
      html+=`<div class="lt-row"><div class="lt-time">${e.date} ${e.time}</div><div class="lt-rep">${e.rep}</div><div class="lt-action" style="color:${e.action==='done'?'#22c55e':e.action==='skip'?'#ef4444':'#333'}">${e.action}</div><div class="lt-street">${e.street}</div><div class="lt-zone" style="color:${zc}">${e.zone}</div></div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;
  document.getElementById('manager').innerHTML=html;
}

function toggleMgZone(id) {
  mgExpandedZone=mgExpandedZone===id?null:id;
  renderManager();
}

// ── INIT ──────────────────────────────────────────────────────────
document.getElementById('pw-input').focus();
buildResources();
renderResources();
</script>
</body>
</html>
